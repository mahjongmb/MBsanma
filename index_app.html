<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>麻雀MB 三麻アプリ版</title>
  <meta name="description" content="麻雀MBの三麻アプリ版入口ページです。" />
  <style>
    :root{
      --bg:#0a1712;
      --bg2:#123025;
      --panel:rgba(8, 20, 15, 0.78);
      --line:rgba(255,255,255,0.12);
      --text:#f6f7f3;
      --muted:rgba(246,247,243,0.72);
      --gold:#d9bb72;
      --gold-strong:#f1d48d;
      --shadow:0 18px 54px rgba(0,0,0,0.34);
    }

    *{
      box-sizing:border-box;
    }

    html,
    body{
      margin:0;
      min-height:100%;
    }

    body{
      min-height:100vh;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 50% 18%, rgba(241,212,141,0.18), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(31,94,67,0.26), transparent 36%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg) 58%, #08110d 100%);
      overflow:hidden;
    }

    body::before,
    body::after{
      content:"";
      position:fixed;
      inset:auto;
      pointer-events:none;
      border-radius:50%;
      filter:blur(2px);
      opacity:0.58;
    }

    body::before{
      width:360px;
      height:360px;
      top:-120px;
      left:-120px;
      background:radial-gradient(circle, rgba(255,255,255,0.08), transparent 68%);
    }

    body::after{
      width:300px;
      height:300px;
      right:-90px;
      bottom:-90px;
      background:radial-gradient(circle, rgba(217,187,114,0.16), transparent 68%);
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .titleScreen{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      position:relative;
    }

    .titlePanel{
      width:min(100%, 720px);
      padding:42px 28px 30px;
      border-radius:28px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
        var(--panel);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      text-align:center;
      backdrop-filter:blur(10px);
      position:relative;
      overflow:hidden;
    }

    .titlePanel::before{
      content:"";
      position:absolute;
      inset:-120px auto auto 50%;
      width:260px;
      height:260px;
      transform:translateX(-50%);
      border-radius:50%;
      background:radial-gradient(circle, rgba(217,187,114,0.15), transparent 70%);
      pointer-events:none;
    }

    .titleInner{
      position:relative;
      z-index:1;
    }

    .titleKicker{
      font-size:13px;
      font-weight:800;
      letter-spacing:0.18em;
      color:var(--gold-strong);
    }

    .titleLogo{
      margin-top:14px;
      font-size:clamp(44px, 9vw, 84px);
      font-weight:900;
      letter-spacing:0.06em;
      line-height:1;
      text-shadow:0 10px 28px rgba(0,0,0,0.24);
    }

    .titleSub{
      margin-top:12px;
      font-size:clamp(20px, 4.4vw, 34px);
      font-weight:800;
      line-height:1.3;
    }

    .titleLead{
      margin:16px auto 0;
      max-width:32em;
      font-size:14px;
      line-height:1.8;
      color:var(--muted);
    }

    .titleActions{
      margin-top:28px;
      display:grid;
      gap:12px;
    }

    .mainStartBtn,
    .subMenuBtn{
      min-height:56px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 18px;
      font-size:16px;
      font-weight:800;
      transition:transform 0.16s ease, background 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
    }

    .mainStartBtn:hover,
    .subMenuBtn:hover{
      transform:translateY(-1px);
    }

    .mainStartBtn{
      background:linear-gradient(180deg, #f2d58f 0%, #d9bb72 100%);
      color:#1e1402;
      box-shadow:0 14px 30px rgba(0,0,0,0.26);
    }

    .subActionGrid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:12px;
    }

    .subMenuBtn{
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.04);
      color:var(--text);
    }

    .titleFooter{
      margin-top:22px;
      display:flex;
      justify-content:center;
      gap:16px;
      flex-wrap:wrap;
      font-size:13px;
      color:var(--muted);
    }

    .titleFooter a{
      padding-bottom:2px;
      border-bottom:1px solid rgba(255,255,255,0.16);
    }

    .cornerLabel{
      position:fixed;
      left:18px;
      bottom:14px;
      font-size:11px;
      letter-spacing:0.12em;
      color:rgba(255,255,255,0.34);
      pointer-events:none;
    }

    @media (max-width: 640px){
      .titleScreen{
        padding:16px;
      }

      .titlePanel{
        padding:34px 18px 22px;
        border-radius:22px;
      }

      .titleLead{
        font-size:13px;
        line-height:1.7;
      }

      .mainStartBtn,
      .subMenuBtn{
        min-height:52px;
        font-size:15px;
      }

      .subActionGrid{
        grid-template-columns:1fr;
      }

      .titleFooter{
        margin-top:18px;
        gap:12px;
        font-size:12px;
      }

      .cornerLabel{
        left:12px;
        bottom:10px;
        font-size:10px;
      }
    }


    .startLoginOverlay{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:rgba(0,0,0,0.62);
      z-index:30;
      backdrop-filter:blur(8px);
    }

    .startLoginOverlay.isOpen{
      display:flex;
    }

    .startLoginPanel{
      width:min(100%, 560px);
      padding:24px 22px 20px;
      border-radius:24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03)),
        rgba(8, 20, 15, 0.96);
      border:1px solid rgba(255,255,255,0.12);
      box-shadow:0 22px 58px rgba(0,0,0,0.42);
      position:relative;
    }

    .startLoginTitle{
      font-size:28px;
      font-weight:900;
      line-height:1.2;
      margin-bottom:8px;
    }

    .startLoginLead{
      font-size:13px;
      line-height:1.8;
      color:var(--muted);
      margin-bottom:18px;
    }

    .startLoginClose{
      position:absolute;
      top:14px;
      right:14px;
      appearance:none;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.06);
      color:var(--text);
      border-radius:999px;
      min-width:38px;
      height:38px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
    }

    .startLoginField{
      display:grid;
      gap:8px;
      margin-bottom:12px;
    }

    .startLoginLabel{
      font-size:13px;
      font-weight:800;
      color:var(--gold-strong);
      letter-spacing:0.04em;
    }

    .startLoginInput{
      width:100%;
      min-height:52px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.05);
      color:var(--text);
      padding:0 14px;
      font-size:16px;
      font-weight:700;
      outline:none;
    }

    .startLoginInput:focus{
      border-color:rgba(241,212,141,0.42);
      box-shadow:0 0 0 3px rgba(241,212,141,0.12);
    }

    .startLoginNotice{
      min-height:22px;
      margin-bottom:12px;
      font-size:13px;
      font-weight:700;
      color:var(--gold-strong);
    }

    .startLoginNotice.isError{
      color:#ffb2a3;
    }

    .startLoginActions{
      display:grid;
      gap:10px;
    }

    .startLoginActionBtn{
      appearance:none;
      border:1px solid rgba(255,255,255,0.12);
      border-radius:16px;
      min-height:52px;
      padding:0 16px;
      background:rgba(255,255,255,0.05);
      color:var(--text);
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      transition:transform 0.16s ease, background 0.16s ease, border-color 0.16s ease;
    }

    .startLoginActionBtn:hover{
      transform:translateY(-1px);
    }

    .startLoginActionBtn.isPrimary{
      background:linear-gradient(180deg, #f2d58f 0%, #d9bb72 100%);
      color:#1e1402;
      border-color:transparent;
    }

    .startLoginActionBtn.isGuest{
      background:rgba(255,255,255,0.03);
    }

    .startLoginFootnote{
      margin-top:14px;
      font-size:12px;
      line-height:1.7;
      color:var(--muted);
    }

    @media (max-width: 640px){
      .startLoginOverlay{
        padding:14px;
      }

      .startLoginPanel{
        padding:20px 16px 16px;
        border-radius:20px;
      }

      .startLoginTitle{
        font-size:24px;
        padding-right:42px;
      }

      .startLoginLead,
      .startLoginFootnote,
      .startLoginNotice{
        font-size:12px;
      }

      .startLoginInput,
      .startLoginActionBtn{
        min-height:50px;
        font-size:15px;
      }
    }

  </style>

  <script>
    (function(){
      const ACTIVE_SESSION_STORAGE_KEY = "mbsanma_app_active_session_v1";
      const LAST_ACCOUNT_ID_STORAGE_KEY = "mbsanma_app_last_account_id_v1";
      const ACCOUNT_REGISTRY_STORAGE_KEY = "mbsanma_app_account_registry_v1";
      const LOCAL_HISTORY_STORAGE_KEY = "mbsanma_app_local_history_v1";
      const LOCAL_TRACKER_STORAGE_KEY = "mbsanma_app_local_tracker_v1";
      const ACCOUNT_KEY_PREFIX = "mbsanma_app_account_";

      const LEGACY_ACTIVE_SESSION_STORAGE_KEY = "mbsanma_visitor_active_session_v1";
      const LEGACY_LAST_ACCOUNT_ID_STORAGE_KEY = "mbsanma_visitor_last_account_id_v1";
      const LEGACY_ACCOUNT_REGISTRY_STORAGE_KEY = "mbsanma_visitor_account_registry_v1";
      const LEGACY_HISTORY_STORAGE_KEY = "mbsanma_visitor_recent_hanchans_v1";
      const LEGACY_TRACKER_STORAGE_KEY = "mbsanma_visitor_current_hanchan_v1";
      const LEGACY_LOCAL_HISTORY_STORAGE_KEY = "mbsanma_visitor_guest_history_v1";
      const LEGACY_LOCAL_TRACKER_STORAGE_KEY = "mbsanma_visitor_guest_tracker_v1";
      const LEGACY_ACCOUNT_KEY_PREFIX = "mbsanma_visitor_account_";

      const openBtn = document.getElementById("openStartLoginBtn");
      const overlay = document.getElementById("startLoginOverlay");
      const closeBtn = document.getElementById("startLoginCloseBtn");
      const input = document.getElementById("visitorAccountInput");
      const notice = document.getElementById("startLoginNotice");
      const startWithAccountBtn = document.getElementById("startWithAccountBtn");
      const issueAccountBtn = document.getElementById("issueAccountBtn");
      const guestStartBtn = document.getElementById("guestStartBtn");

      let isBusy = false;

      function normalizeAccountId(value){
        return String(value || "").toUpperCase().replace(/[^A-Z0-9]/g, "");
      }

      function buildLegacyAccountHistoryKey(accountId){
        return `${LEGACY_ACCOUNT_KEY_PREFIX}${accountId}_history_v1`;
      }

      function buildLegacyAccountTrackerKey(accountId){
        return `${LEGACY_ACCOUNT_KEY_PREFIX}${accountId}_tracker_v1`;
      }

      function copyStorageValueIfMissing(storage, nextKey, legacyKey){
        try{
          if (storage.getItem(nextKey) != null) return;
          const legacyValue = storage.getItem(legacyKey);
          if (legacyValue != null) storage.setItem(nextKey, legacyValue);
        }catch(e){}
      }

      function migrateLegacyAppStorage(){
        copyStorageValueIfMissing(localStorage, LAST_ACCOUNT_ID_STORAGE_KEY, LEGACY_LAST_ACCOUNT_ID_STORAGE_KEY);
        copyStorageValueIfMissing(localStorage, ACCOUNT_REGISTRY_STORAGE_KEY, LEGACY_ACCOUNT_REGISTRY_STORAGE_KEY);
        copyStorageValueIfMissing(localStorage, LOCAL_HISTORY_STORAGE_KEY, LEGACY_LOCAL_HISTORY_STORAGE_KEY);
        copyStorageValueIfMissing(localStorage, LOCAL_TRACKER_STORAGE_KEY, LEGACY_LOCAL_TRACKER_STORAGE_KEY);

        try{
          const raw = localStorage.getItem(LEGACY_ACCOUNT_REGISTRY_STORAGE_KEY);
          if (!raw) return;
          const registry = JSON.parse(raw);
          if (!registry || typeof registry !== "object") return;
          Object.keys(registry).forEach((accountId)=>{
            const normalized = normalizeAccountId(accountId);
            if (!normalized) return;
            copyStorageValueIfMissing(localStorage, `${ACCOUNT_KEY_PREFIX}${normalized}_history_v1`, buildLegacyAccountHistoryKey(normalized));
            copyStorageValueIfMissing(localStorage, `${ACCOUNT_KEY_PREFIX}${normalized}_tracker_v1`, buildLegacyAccountTrackerKey(normalized));
          });
        }catch(e){}
      }

      function loadLastAccountId(){
        try{
          return normalizeAccountId(localStorage.getItem(LAST_ACCOUNT_ID_STORAGE_KEY) || "");
        }catch(e){
          return "";
        }
      }

      function saveLastAccountId(accountId){
        const normalized = normalizeAccountId(accountId);
        try{
          if (normalized){
            localStorage.setItem(LAST_ACCOUNT_ID_STORAGE_KEY, normalized);
          } else {
            localStorage.removeItem(LAST_ACCOUNT_ID_STORAGE_KEY);
          }
        }catch(e){}
      }

      function restoreLastAccountId(){
        if (!input) return;
        const lastAccountId = loadLastAccountId();
        if (lastAccountId) input.value = lastAccountId;
      }

      function isCloudSyncReady(){
        return !!(window.MBSanmaSupabase && typeof window.MBSanmaSupabase.isConfigured === "function" && window.MBSanmaSupabase.isConfigured());
      }

      function setBusyState(nextBusy){
        isBusy = !!nextBusy;
        [input, startWithAccountBtn, issueAccountBtn, guestStartBtn, closeBtn].forEach((el)=>{
          if (!el) return;
          el.disabled = isBusy;
        });
      }

      function loadAccountRegistry(){
        try{
          const raw = localStorage.getItem(ACCOUNT_REGISTRY_STORAGE_KEY);
          if (!raw) return {};
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === "object" ? parsed : {};
        }catch(e){
          return {};
        }
      }

      function saveAccountRegistry(registry){
        try{
          localStorage.setItem(ACCOUNT_REGISTRY_STORAGE_KEY, JSON.stringify(registry && typeof registry === "object" ? registry : {}));
        }catch(e){}
      }

      function buildAccountHistoryKey(accountId){
        return `${ACCOUNT_KEY_PREFIX}${accountId}_history_v1`;
      }

      function buildAccountTrackerKey(accountId){
        return `${ACCOUNT_KEY_PREFIX}${accountId}_tracker_v1`;
      }

      function normalizeTrackerShape(src){
        const next = {
          kyokuCount: 0,
          furoKyokuCount: 0,
          riichiAgariCount: 0,
          furoAgariCount: 0,
          damaAgariCount: 0,
          lastRoundSignature: "",
          lastSavedHanchanSignature: ""
        };
        if (src && typeof src === "object"){
          if (Number.isFinite(src.kyokuCount)) next.kyokuCount = Math.max(0, src.kyokuCount | 0);
          if (Number.isFinite(src.furoKyokuCount)) next.furoKyokuCount = Math.max(0, src.furoKyokuCount | 0);
          if (Number.isFinite(src.riichiAgariCount)) next.riichiAgariCount = Math.max(0, src.riichiAgariCount | 0);
          if (Number.isFinite(src.furoAgariCount)) next.furoAgariCount = Math.max(0, src.furoAgariCount | 0);
          if (Number.isFinite(src.damaAgariCount)) next.damaAgariCount = Math.max(0, src.damaAgariCount | 0);
          if (typeof src.lastRoundSignature === "string") next.lastRoundSignature = src.lastRoundSignature;
          if (typeof src.lastSavedHanchanSignature === "string") next.lastSavedHanchanSignature = src.lastSavedHanchanSignature;
        }
        return next;
      }

      function normalizeSnapshot(snapshot){
        const src = snapshot && typeof snapshot === "object" ? snapshot : {};
        return {
          history: Array.isArray(src.history_json) ? src.history_json : [],
          tracker: normalizeTrackerShape(src.tracker_json),
          createdAt: src.created_at || new Date().toISOString(),
          updatedAt: src.updated_at || new Date().toISOString()
        };
      }

      function cacheAccountSnapshotToLocal(accountId, snapshot){
        const normalized = normalizeSnapshot(snapshot);
        const historyKey = buildAccountHistoryKey(accountId);
        const trackerKey = buildAccountTrackerKey(accountId);

        try{
          localStorage.setItem(historyKey, JSON.stringify(normalized.history));
        }catch(e){}

        try{
          localStorage.setItem(trackerKey, JSON.stringify(normalized.tracker));
        }catch(e){}

        const registry = loadAccountRegistry();
        registry[accountId] = {
          createdAt: normalized.createdAt,
          updatedAt: normalized.updatedAt,
          cloud: isCloudSyncReady()
        };
        saveAccountRegistry(registry);
      }

      function migrateLegacyDataToAccount(accountId){
        if (!accountId) return;

        const historyKey = buildAccountHistoryKey(accountId);
        const trackerKey = buildAccountTrackerKey(accountId);
        const legacyHistoryKey = buildLegacyAccountHistoryKey(accountId);
        const legacyTrackerKey = buildLegacyAccountTrackerKey(accountId);

        copyStorageValueIfMissing(localStorage, historyKey, legacyHistoryKey);
        copyStorageValueIfMissing(localStorage, trackerKey, legacyTrackerKey);

        try{
          if (!localStorage.getItem(historyKey)){
            const legacyHistory = localStorage.getItem(LEGACY_HISTORY_STORAGE_KEY);
            if (legacyHistory) localStorage.setItem(historyKey, legacyHistory);
          }
        }catch(e){}

        try{
          if (!localStorage.getItem(trackerKey)){
            const legacyTracker = localStorage.getItem(LEGACY_TRACKER_STORAGE_KEY);
            if (legacyTracker) localStorage.setItem(trackerKey, legacyTracker);
          }
        }catch(e){}
      }

      function clearLocalSessionData(){
        try{ localStorage.removeItem(LOCAL_HISTORY_STORAGE_KEY); }catch(e){}
        try{ localStorage.removeItem(LOCAL_TRACKER_STORAGE_KEY); }catch(e){}
      }

      function setActiveSession(mode, accountId){
        try{
          sessionStorage.setItem(ACTIVE_SESSION_STORAGE_KEY, JSON.stringify({
            mode: mode === "account" ? "account" : "local",
            accountId: mode === "account" ? normalizeAccountId(accountId) : ""
          }));
        }catch(e){}
      }

      function showNotice(message, isError){
        if (!notice) return;
        notice.textContent = message || "";
        notice.classList.toggle("isError", !!isError);
      }

      function openOverlay(){
        if (!overlay) return;
        overlay.classList.add("isOpen");
        overlay.setAttribute("aria-hidden", "false");
        showNotice("", false);
        window.setTimeout(()=>{
          try{ if (input) input.focus(); }catch(e){}
        }, 0);
      }

      function closeOverlay(){
        if (!overlay || isBusy) return;
        overlay.classList.remove("isOpen");
        overlay.setAttribute("aria-hidden", "true");
      }

      function getFriendlyErrorMessage(error){
        const message = String(error && error.message || "");
        if (message === "account_not_found") return "そのアカウント番号はまだ発行されていません。";
        if (message === "account_exists") return "アカウント発行に失敗しました。もう一度試してください。";
        if (message === "rpc_timeout") return "通信がタイムアウトしました。時間をおいて試してください。";
        if (message === "supabase_not_configured") return "クラウド保存の設定がまだ入っていません。";
        return "通信に失敗しました。接続状況を確認して、もう一度試してください。";
      }

      async function startWithAccount(accountId){
        const normalized = normalizeAccountId(accountId);
        if (!normalized){
          showNotice("アカウント番号を入力してください。", true);
          return;
        }

        setBusyState(true);
        try{
          if (isCloudSyncReady()){
            showNotice("成績を読み込んでいます…", false);
            const result = await window.MBSanmaSupabase.fetchAccountSnapshot(normalized);
            if (result.error){
              showNotice(getFriendlyErrorMessage(result.error), true);
              return;
            }
            cacheAccountSnapshotToLocal(normalized, result.data);
            saveLastAccountId(normalized);
            setActiveSession("account", normalized);
            location.href = "play_app.html";
            return;
          }

          const registry = loadAccountRegistry();
          if (!registry[normalized]){
            showNotice("そのアカウント番号はまだ発行されていません。", true);
            return;
          }

          saveLastAccountId(normalized);
          setActiveSession("account", normalized);
          location.href = "play_app.html";
        }finally{
          setBusyState(false);
        }
      }

      async function issueAccountAndStart(){
        setBusyState(true);
        try{
          const registry = loadAccountRegistry();
          let accountId = "";

          for (let i = 0; i < 100; i++){
            const next = `MB${String(Math.floor(Math.random() * 100000000)).padStart(8, "0")}`;

            if (isCloudSyncReady()){
              const result = await window.MBSanmaSupabase.issueAccount(next);
              if (!result.error){
                accountId = next;
                cacheAccountSnapshotToLocal(accountId, result.data);
                break;
              }
              if (String(result.error.message || "") === "account_exists"){
                continue;
              }
              showNotice(getFriendlyErrorMessage(result.error), true);
              return;
            }

            if (!registry[next]){
              accountId = next;
              break;
            }
          }

          if (!accountId){
            showNotice("アカウント発行に失敗しました。もう一度試してください。", true);
            return;
          }

          if (!isCloudSyncReady()){
            registry[accountId] = {
              createdAt: new Date().toISOString(),
              cloud: false
            };
            saveAccountRegistry(registry);
            migrateLegacyDataToAccount(accountId);
          }

          if (input) input.value = accountId;
          saveLastAccountId(accountId);
          setActiveSession("account", accountId);
          location.href = "play_app.html";
        }finally{
          setBusyState(false);
        }
      }

      function startAsLocal(){
        if (isBusy) return;
        setActiveSession("local", "");
        location.href = "play_app.html";
      }

      if (openBtn){
        openBtn.addEventListener("click", (ev)=>{
          ev.preventDefault();
          openOverlay();
        });
      }

      if (closeBtn){
        closeBtn.addEventListener("click", ()=> closeOverlay());
      }

      if (overlay){
        overlay.addEventListener("click", (ev)=>{
          if (ev.target === overlay) closeOverlay();
        });
      }

      if (startWithAccountBtn){
        startWithAccountBtn.addEventListener("click", ()=> startWithAccount(input ? input.value : ""));
      }

      if (issueAccountBtn){
        issueAccountBtn.addEventListener("click", ()=> issueAccountAndStart());
      }

      if (guestStartBtn){
        guestStartBtn.addEventListener("click", ()=> startAsLocal());
      }

      if (input){
        input.addEventListener("input", ()=>{
          input.value = normalizeAccountId(input.value);
          saveLastAccountId(input.value);
          if (notice && notice.textContent) showNotice("", false);
        });
        input.addEventListener("keydown", (ev)=>{
          if (ev.key === "Enter"){
            ev.preventDefault();
            startWithAccount(input.value);
          }
        });
      }

      document.addEventListener("keydown", (ev)=>{
        if (ev.key === "Escape") closeOverlay();
      });

      migrateLegacyAppStorage();
      restoreLastAccountId();
    })();
  </script>


</body>
</html>
