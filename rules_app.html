<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ルール変更</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:linear-gradient(180deg,#103126 0%,#08120e 100%);
      color:#f6f7f3;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      padding:24px;
      box-sizing:border-box;
    }
    .panel{
      width:min(100%,640px);
      padding:28px 24px;
      border-radius:24px;
      background:rgba(8,20,15,0.82);
      border:1px solid rgba(255,255,255,0.12);
      text-align:center;
    }
    h1{margin:0 0 14px;font-size:32px;}
    p{margin:0 0 18px;line-height:1.8;color:rgba(246,247,243,0.78);}
    a{display:inline-flex;min-height:48px;align-items:center;justify-content:center;padding:0 18px;border-radius:14px;background:linear-gradient(180deg,#f2d58f 0%,#d9bb72 100%);color:#1e1402;text-decoration:none;font-weight:800;}
  </style>
</head>
<body>
  <div class="panel">
    <h1>ルール変更</h1>
    <p>あとでルールカスタムUIを作り込むための仮ページです。</p>
    <a href="index_app.html">トップへ戻る</a>
  </div>
</body>
</html>
