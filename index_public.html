<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>麻雀MB 三麻体験版</title>
  <meta name="description" content="麻雀MBの三麻体験版トップページです。" />
  <style>
    :root{
      --bg:#0a1712;
      --bg2:#123025;
      --panel:rgba(8, 20, 15, 0.78);
      --line:rgba(255,255,255,0.12);
      --text:#f6f7f3;
      --muted:rgba(246,247,243,0.72);
      --gold:#d9bb72;
      --gold-strong:#f1d48d;
      --shadow:0 18px 54px rgba(0,0,0,0.34);
    }

    *{
      box-sizing:border-box;
    }

    html,
    body{
      margin:0;
      min-height:100%;
    }

    body{
      min-height:100vh;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 50% 18%, rgba(241,212,141,0.18), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(31,94,67,0.26), transparent 36%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg) 58%, #08110d 100%);
      overflow:hidden;
    }

    body::before,
    body::after{
      content:"";
      position:fixed;
      inset:auto;
      pointer-events:none;
      border-radius:50%;
      filter:blur(2px);
      opacity:0.58;
    }

    body::before{
      width:360px;
      height:360px;
      top:-120px;
      left:-120px;
      background:radial-gradient(circle, rgba(255,255,255,0.08), transparent 68%);
    }

    body::after{
      width:300px;
      height:300px;
      right:-90px;
      bottom:-90px;
      background:radial-gradient(circle, rgba(217,187,114,0.16), transparent 68%);
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .titleScreen{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      position:relative;
    }

    .titlePanel{
      width:min(100%, 720px);
      padding:42px 28px 30px;
      border-radius:28px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
        var(--panel);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      text-align:center;
      backdrop-filter:blur(10px);
      position:relative;
      overflow:hidden;
    }

    .titlePanel::before{
      content:"";
      position:absolute;
      inset:-120px auto auto 50%;
      width:260px;
      height:260px;
      transform:translateX(-50%);
      border-radius:50%;
      background:radial-gradient(circle, rgba(217,187,114,0.15), transparent 70%);
      pointer-events:none;
    }

    .titleInner{
      position:relative;
      z-index:1;
    }

    .titleKicker{
      font-size:13px;
      font-weight:800;
      letter-spacing:0.18em;
      color:var(--gold-strong);
    }

    .titleLogo{
      margin-top:14px;
      font-size:clamp(44px, 9vw, 84px);
      font-weight:900;
      letter-spacing:0.06em;
      line-height:1;
      text-shadow:0 10px 28px rgba(0,0,0,0.24);
    }

    .titleSub{
      margin-top:12px;
      font-size:clamp(20px, 4.4vw, 34px);
      font-weight:800;
      line-height:1.3;
    }

    .titleLead{
      margin:16px auto 0;
      max-width:32em;
      font-size:14px;
      line-height:1.8;
      color:var(--muted);
    }

    .titleActions{
      margin-top:28px;
      display:grid;
      gap:12px;
    }

    .mainStartBtn,
    .subMenuBtn{
      min-height:56px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 18px;
      font-size:16px;
      font-weight:800;
      transition:transform 0.16s ease, background 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
    }

    .mainStartBtn:hover,
    .subMenuBtn:hover{
      transform:translateY(-1px);
    }

    .mainStartBtn{
      background:linear-gradient(180deg, #f2d58f 0%, #d9bb72 100%);
      color:#1e1402;
      box-shadow:0 14px 30px rgba(0,0,0,0.26);
    }

    .subActionGrid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:12px;
    }

    .subMenuBtn{
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.04);
      color:var(--text);
    }

    .titleFooter{
      margin-top:22px;
      display:flex;
      justify-content:center;
      gap:16px;
      flex-wrap:wrap;
      font-size:13px;
      color:var(--muted);
    }

    .titleFooter a{
      padding-bottom:2px;
      border-bottom:1px solid rgba(255,255,255,0.16);
    }

    .cornerLabel{
      position:fixed;
      left:18px;
      bottom:14px;
      font-size:11px;
      letter-spacing:0.12em;
      color:rgba(255,255,255,0.34);
      pointer-events:none;
    }

    @media (max-width: 640px){
      .titleScreen{
        padding:16px;
      }

      .titlePanel{
        padding:34px 18px 22px;
        border-radius:22px;
      }

      .titleLead{
        font-size:13px;
        line-height:1.7;
      }

      .mainStartBtn,
      .subMenuBtn{
        min-height:52px;
        font-size:15px;
      }

      .subActionGrid{
        grid-template-columns:1fr;
      }

      .titleFooter{
        margin-top:18px;
        gap:12px;
        font-size:12px;
      }

      .cornerLabel{
        left:12px;
        bottom:10px;
        font-size:10px;
      }
    }
  </style>
</head>
<body>
  <main class="titleScreen">
    <section class="titlePanel" aria-label="麻雀MB 三麻体験版 トップ">
      <div class="titleInner">
        <div class="titleKicker">MAHJONG MB</div>
        <div class="titleLogo">麻雀MB</div>
        <div class="titleSub">三麻体験版</div>
        <p class="titleLead">
          お店のルールをブラウザで気軽に体験できます。<br />
          まずは一局、遊んでみてください。
        </p>

        <div class="titleActions">
          <a class="mainStartBtn" href="play.html">体験をはじめる</a>
          <div class="subActionGrid">
            <a class="subMenuBtn" href="rules.html">ルール</a>
            <a class="subMenuBtn" href="price.html">料金・営業時間</a>
            <a class="subMenuBtn" href="access.html">アクセス</a>
          </div>
        </div>

        <div class="titleFooter">
          <a href="line.html">LINE</a>
          <a href="https://majyan-mb.com/" target="_blank" rel="noopener noreferrer">麻雀王国</a>
        </div>
      </div>
    </section>
  </main>

  <div class="cornerLabel">SANMA TRIAL VERSION</div>
</body>
</html>
