<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>verify | SANMA LAB</title>
  <style>
    :root{
      --bg:#08120e;
      --bg2:#103126;
      --panel:rgba(8, 20, 15, 0.84);
      --line:rgba(255,255,255,0.12);
      --text:#f6f7f3;
      --muted:rgba(246,247,243,0.74);
      --gold:#d9bb72;
      --gold-strong:#f3d78e;
      --shadow:0 18px 54px rgba(0,0,0,0.34);
    }

    *{ box-sizing:border-box; }

    html,
    body{
      margin:0;
      min-height:100%;
    }

    body{
      min-height:100vh;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 50% 14%, rgba(241,212,141,0.18), transparent 22%),
        radial-gradient(circle at 50% 100%, rgba(31,94,67,0.28), transparent 34%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg) 58%, #050c09 100%);
      overflow-x:hidden;
    }

    .page{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
    }

    .panel{
      width:min(100%, 760px);
      padding:42px 28px 28px;
      border-radius:28px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
        var(--panel);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      text-align:center;
      backdrop-filter:blur(10px);
    }

    .kicker{
      font-size:13px;
      font-weight:800;
      letter-spacing:0.2em;
      color:var(--gold-strong);
    }

    h1{
      margin:14px 0 10px;
      font-size:clamp(34px, 7vw, 56px);
      line-height:1.1;
    }

    .lead{
      margin:0 auto;
      max-width:34em;
      font-size:14px;
      line-height:1.9;
      color:var(--muted);
    }

    .placeholder{
      margin-top:26px;
      padding:22px 18px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,0.08);
      background:rgba(255,255,255,0.04);
    }

    .placeholderTitle{
      font-size:20px;
      font-weight:900;
      color:var(--gold-strong);
    }

    .placeholderText{
      margin-top:10px;
      font-size:14px;
      line-height:1.8;
      color:var(--muted);
    }

    .actions{
      margin-top:24px;
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .btn{
      min-height:52px;
      padding:0 18px;
      border-radius:14px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.05);
      color:var(--text);
      font-size:15px;
      font-weight:800;
      text-decoration:none;
      transition:transform 0.16s ease, background 0.16s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,0.08);
    }

    .btn.isPrimary{
      background:linear-gradient(180deg, #f2d58f 0%, #d9bb72 100%);
      color:#1e1402;
      border-color:transparent;
    }

    @media (max-width: 640px){
      .page{ padding:16px; }
      .panel{ padding:34px 18px 22px; border-radius:22px; }
      .lead,
      .placeholderText{ font-size:13px; }
      .actions{ flex-direction:column; }
      .btn{ width:100%; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel">
      <div class="kicker">SANMA LAB</div>
      <h1>検証モード</h1>
      <p class="lead">
        このページは入口だけ先に作った仮ページです。<br />
        次の段階で、それぞれの中身を役割ごとに実装していきます。
      </p>

      <div class="placeholder">
        <div class="placeholderTitle">準備中</div>
        <div class="placeholderText">
          ここには 局面検証、配牌指定、CPU比較、自動対局バッチなどのUI を入れる想定です。
        </div>
      </div>

      <div class="actions">
        <a class="btn isPrimary" href="index_app.html">トップへ戻る</a>
        <a class="btn" href="play_app.html">対局モードへ</a>
      </div>
    </section>
  </main>
</body>
</html>
