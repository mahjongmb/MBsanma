<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SANMA LAB / 牌譜一覧</title>
  <meta name="description" content="保存した対局を一覧で見て、牌譜再生へ進めるページです。" />
  <style>
    :root{
      --bg:#08120e;
      --bg2:#103126;
      --panel:rgba(8,20,15,0.82);
      --line:rgba(255,255,255,0.12);
      --text:#f6f7f3;
      --muted:rgba(246,247,243,0.74);
      --gold:#d9bb72;
      --gold-strong:#f3d78e;
      --shadow:0 18px 54px rgba(0,0,0,0.34);
      --blue-card:linear-gradient(180deg, rgba(17,43,96,0.92), rgba(12,29,74,0.9));
    }
    *{ box-sizing:border-box; }
    html, body{ margin:0; min-height:100%; }
    body{
      min-height:100vh;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 50% 14%, rgba(241,212,141,0.18), transparent 22%),
        radial-gradient(circle at 50% 100%, rgba(31,94,67,0.28), transparent 34%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg) 58%, #050c09 100%);
      overflow-x:hidden;
    }
    body::before,
    body::after{
      content:"";
      position:fixed;
      pointer-events:none;
      border-radius:50%;
      filter:blur(2px);
      opacity:0.58;
    }
    body::before{
      width:360px;height:360px;top:-120px;left:-120px;
      background:radial-gradient(circle, rgba(255,255,255,0.08), transparent 68%);
    }
    body::after{
      width:320px;height:320px;right:-100px;bottom:-100px;
      background:radial-gradient(circle, rgba(217,187,114,0.18), transparent 68%);
    }
    a, button{ color:inherit; font:inherit; }
    .page{ min-height:100vh; padding:24px; display:grid; place-items:center; }
    .panel{
      width:min(100%, 1180px);
      padding:24px 24px 22px;
      border-radius:30px;
      background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)), var(--panel);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      position:relative;
      overflow:hidden;
    }
    .panel::before{
      content:"";position:absolute;inset:-140px auto auto 50%;width:320px;height:320px;transform:translateX(-50%);border-radius:50%;
      background:radial-gradient(circle, rgba(217,187,114,0.16), transparent 70%);pointer-events:none;
    }
    .inner{ position:relative; z-index:1; }
    .topBar{ display:flex; align-items:flex-start; justify-content:space-between; gap:18px; flex-wrap:wrap; margin-bottom:18px; }
    .titleBlock{ display:grid; gap:8px; }
    .kicker{ font-size:12px; font-weight:800; letter-spacing:0.22em; color:var(--gold-strong); }
    .title{ font-size:clamp(34px, 6vw, 62px); font-weight:900; line-height:1; letter-spacing:0.04em; text-shadow:0 10px 28px rgba(0,0,0,0.24); }
    .sub{ font-size:clamp(18px, 2.8vw, 26px); font-weight:800; color:rgba(255,255,255,0.92); }
    .topActions{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
    .backBtn,.accountBadge,.filterBtn,.openBtn{ min-height:42px; border-radius:16px; }
    .backBtn,.filterBtn,.openBtn{
      appearance:none;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);padding:0 16px;cursor:pointer;font-size:14px;font-weight:800;
      transition:transform 0.16s ease, background 0.16s ease, border-color 0.16s ease;
      display:inline-flex;align-items:center;justify-content:center;text-decoration:none;
    }
    .backBtn:hover,.filterBtn:hover,.openBtn:hover{ transform:translateY(-1px); }
    .backBtn{ background:linear-gradient(180deg, #f2d58f 0%, #d9bb72 100%); border-color:transparent; color:#1e1402; }
    .accountBadge{ display:inline-flex; align-items:center; justify-content:center; padding:0 14px; border:1px solid rgba(255,214,111,0.20); background:rgba(255,214,111,0.08); color:#fff3c5; font-size:13px; font-weight:900; }
    .lead{ margin:0 0 18px; font-size:14px; line-height:1.9; color:var(--muted); }
    .toolbar{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
    .filterBtn.isActive{ background:linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.06)), rgba(76, 119, 98, 0.78); border-color:rgba(182, 227, 201, 0.24); color:#fff; }
    .list{ display:grid; gap:14px; }
    .card{
      border-radius:22px; border:1px solid rgba(241,212,141,0.18); background:var(--blue-card); padding:16px 18px 16px; display:grid; gap:14px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .cardHead{ display:flex; align-items:flex-start; justify-content:space-between; gap:14px; flex-wrap:wrap; }
    .cardTitleWrap{ display:grid; gap:6px; }
    .cardTitle{ font-size:26px; font-weight:900; line-height:1.15; color:#fff0bf; }
    .cardMeta{ font-size:12px; line-height:1.7; color:rgba(245,247,244,0.76); }
    .metaLine{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
    .modeBadge,.sessionBadge,.resultBadge{
      display:inline-flex; align-items:center; min-height:30px; padding:0 10px; border-radius:999px; font-size:11px; font-weight:900;
    }
    .modeBadge{ background:rgba(255,214,111,0.10); border:1px solid rgba(255,214,111,0.18); color:#fff3c5; }
    .sessionBadge{ background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); color:rgba(245,247,244,0.86); }
    .resultBadge{ background:rgba(104, 215, 157, 0.12); border:1px solid rgba(104, 215, 157, 0.2); color:#dffff0; }
    .rankGrid{ display:grid; grid-template-columns:repeat(3, minmax(0, 1fr)); gap:10px; }
    .rankCell{ border-radius:16px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.04); padding:12px; display:grid; gap:6px; }
    .rankCell.isPlayer{ border-color:rgba(255,214,111,0.28); background:rgba(255,214,111,0.10); }
    .rankHead{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .rankLabel{ font-size:14px; font-weight:900; color:#7bd0ff; }
    .name{ font-size:15px; font-weight:900; color:#ffffff; }
    .score{ font-size:28px; font-weight:900; line-height:1; color:#ffd56f; }
    .subMeta{ font-size:11px; line-height:1.55; color:rgba(245,247,244,0.70); }
    .cardFoot{ display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    .footText{ font-size:12px; line-height:1.7; color:rgba(245,247,244,0.76); }
    .emptyCard{ border-radius:18px; border:1px dashed rgba(255,255,255,0.18); background:rgba(255,255,255,0.03); padding:18px; font-size:14px; line-height:1.75; color:rgba(245,247,244,0.82); }
    .footerNote{ margin-top:18px; text-align:center; font-size:12px; color:rgba(255,255,255,0.38); letter-spacing:0.10em; }
    @media (max-width: 900px){ .rankGrid{ grid-template-columns:1fr; } }
    @media (max-width: 760px){
      .page{ padding:16px; }
      .panel{ padding:20px 16px 18px; border-radius:24px; }
      .cardTitle{ font-size:22px; }
      .score{ font-size:24px; }
      .toolbar{ display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); }
      .filterBtn{ width:100%; }
      .topActions{ width:100%; justify-content:stretch; }
      .backBtn,.accountBadge{ flex:1 1 0; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel" aria-label="牌譜一覧ページ">
      <div class="inner">
        <div class="topBar">
          <div class="titleBlock">
            <div class="kicker">SANMA REPLAY / LIST</div>
            <div class="title">SANMA LAB</div>
            <div class="sub">牌譜再生</div>
          </div>
          <div class="topActions">
            <a class="backBtn" href="index_app.html">トップに戻る</a>
            <div id="replayAccountBadge" class="accountBadge">ローカル</div>
          </div>
        </div>

        <p class="lead">
          保存した対局の一覧です。見たい半荘を選ぶと、東1局1手目から順に振り返れます。<br>
          成績の見直しや、気になった半荘の流れを確認したいときに使えます。
        </p>

        <div class="toolbar">
          <button type="button" class="filterBtn isActive" data-mode-filter="all">すべて</button>
          <button type="button" class="filterBtn" data-mode-filter="app_play">対局モード</button>
          <button type="button" class="filterBtn" data-mode-filter="cpu_batch">検証モード</button>
          <button type="button" class="filterBtn" data-mode-filter="local">ローカルのみ</button>
        </div>

        <div id="replayListRoot" class="list"></div>

        <div class="footerNote">SANMA LAB REPLAY LIST</div>
      </div>
    </section>
  </main>

  <script src="js/match_log.js"></script>
  <script src="js/log_normalizer.js"></script>
  <script src="js/replay_app_ui.js"></script>
</body>
</html>
